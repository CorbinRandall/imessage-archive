services:
  qdrant:
    image: qdrant/qdrant:v1.13.5
    container_name: imessage-qdrant
    restart: unless-stopped
    volumes:
      # Must be a direct disk path (/mnt/cache), NOT /mnt/user: Unraid's FUSE
      # layer breaks Qdrant's mmap writes and silently zeroes stored vectors.
      - ${QDRANT_PATH:-/mnt/cache/appdata/imessage-archive/qdrant}:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - imessage-archive

  imessage-archive:
    image: imessage-archive:latest
    container_name: imessage-archive
    build:
      context: ${APP_PATH:-/mnt/user/appdata/imessage-archive}/server
    restart: unless-stopped
    runtime: nvidia
    depends_on:
      - qdrant
    environment:
      DATA_DIR: /data
      STATE_DIR: /state
      QDRANT_URL: http://qdrant:6333
      COLLECTION: imessages
      EMBED_MODEL: BAAI/bge-small-en-v1.5
      BATCH_SIZE: "256"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${DATA_PATH:-/mnt/user/Misc/imessage-backup}:/data:ro
      - ${APP_PATH:-/mnt/user/appdata/imessage-archive}/state:/state
    ports:
      - "${SEARCH_PORT:-8095}:8095"
    networks:
      - imessage-archive

networks:
  imessage-archive:
    driver: bridge
