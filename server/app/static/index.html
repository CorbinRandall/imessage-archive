<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iMessage Archive</title>
  <link rel="stylesheet" href="/static/styles.css?v=6" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">iMessage Archive</div>
      <nav>
        <button class="nav active" data-view="dashboard">Dashboard</button>
        <button class="nav" data-view="browse">Messages</button>
        <button class="nav" data-view="media">Media</button>
        <button class="nav" data-view="search">Search</button>
        <button class="nav" data-view="schedules">Schedules</button>
      </nav>
      <div class="sidebar-stats" id="sidebar-stats"></div>
    </aside>

    <main class="main">
      <!-- Dashboard -->
      <section id="view-dashboard" class="view active">
        <header class="view-header">
          <h1>Dashboard</h1>
          <button id="btn-reindex" class="btn secondary">Reindex search</button>
        </header>
        <div class="cards" id="stat-cards"></div>
        <h2>Mac Clients</h2>
        <div id="clients-list" class="clients-list"></div>
        <h2>Recent Backups</h2>
        <div id="runs-list" class="runs-list"></div>
      </section>

      <!-- Messages (browse) -->
      <section id="view-browse" class="view">
        <div class="browse-layout">
          <div class="chat-pane">
            <input id="chat-filter" type="search" placeholder="Search conversations" />
            <div id="chat-list" class="chat-list"></div>
          </div>
          <div class="detail-pane">
            <div id="chat-header" class="chat-header"></div>
            <div id="chat-detail" class="chat-detail">
              <p class="muted center">Select a conversation</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Media -->
      <section id="view-media" class="view">
        <header class="view-header">
          <h1>Media</h1>
          <div class="media-filters">
            <button class="chip active" data-kind="all">All</button>
            <button class="chip" data-kind="photo">Photos</button>
            <button class="chip" data-kind="video">Videos</button>
            <button class="chip" data-kind="gif">GIFs</button>
            <button class="chip" data-kind="audio">Audio</button>
          </div>
        </header>
        <div id="media-count" class="muted"></div>
        <div id="media-grid" class="media-grid"></div>
        <div id="media-more" class="center" style="padding:1rem">
          <button class="btn secondary hidden" id="btn-media-more">Load more</button>
        </div>
      </section>

      <!-- Search -->
      <section id="view-search" class="view">
        <header class="view-header">
          <h1>Semantic Search</h1>
        </header>
        <div class="search-row">
          <input id="search-q" type="search" placeholder="e.g. dentist appointment, wifi password..." autofocus />
          <button id="btn-search" class="btn">Search</button>
        </div>
        <div id="search-results"></div>
      </section>

      <!-- Schedules -->
      <section id="view-schedules" class="view">
        <header class="view-header">
          <h1>Backup Schedules</h1>
          <button id="btn-new-schedule" class="btn">+ New schedule</button>
        </header>
        <p class="muted">Mac agents poll the server every 60s and run backups when a schedule is due.</p>
        <div id="schedules-list"></div>
        <div id="schedule-editor" class="schedule-editor hidden"></div>
      </section>
    </main>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <div id="lightbox-content"></div>
    <div id="lightbox-caption" class="lightbox-caption"></div>
  </div>

  <script src="/static/app.js?v=8"></script>
</body>
</html>
