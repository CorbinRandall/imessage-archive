<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iMessage Archive</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">iMessage Archive</div>
      <nav>
        <button class="nav active" data-view="dashboard">Dashboard</button>
        <button class="nav" data-view="browse">Browse</button>
        <button class="nav" data-view="search">Search</button>
        <button class="nav" data-view="schedules">Schedules</button>
      </nav>
      <div class="sidebar-stats" id="sidebar-stats"></div>
    </aside>

    <main class="main">
      <!-- Dashboard -->
      <section id="view-dashboard" class="view active">
        <header class="view-header">
          <h1>Dashboard</h1>
          <button id="btn-reindex" class="btn secondary">Reindex search</button>
        </header>
        <div class="cards" id="stat-cards"></div>
        <h2>Mac Clients</h2>
        <div id="clients-list" class="clients-list"></div>
        <h2>Recent Backups</h2>
        <div id="runs-list" class="runs-list"></div>
      </section>

      <!-- Browse -->
      <section id="view-browse" class="view">
        <header class="view-header">
          <h1>Browse</h1>
          <input id="chat-filter" type="search" placeholder="Filter conversations..." />
        </header>
        <div class="browse-layout">
          <div id="chat-list" class="chat-list"></div>
          <div id="chat-detail" class="chat-detail">
            <p class="muted">Select a conversation</p>
          </div>
        </div>
      </section>

      <!-- Search -->
      <section id="view-search" class="view">
        <header class="view-header">
          <h1>Semantic Search</h1>
        </header>
        <div class="search-row">
          <input id="search-q" type="search" placeholder="e.g. dentist appointment, wifi password..." autofocus />
          <button id="btn-search" class="btn">Search</button>
        </div>
        <div id="search-results"></div>
      </section>

      <!-- Schedules -->
      <section id="view-schedules" class="view">
        <header class="view-header">
          <h1>Backup Schedules</h1>
          <button id="btn-new-schedule" class="btn">+ New schedule</button>
        </header>
        <p class="muted">Mac agents poll the server every 60s and run backups when a schedule is due.</p>
        <div id="schedules-list"></div>
        <div id="schedule-editor" class="schedule-editor hidden"></div>
      </section>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
